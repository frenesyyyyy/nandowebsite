<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUMMER club | Promozioni Riservate</title>
    <meta name="description" content="Accesso riservato tramite codice promozionale SUMMER club. Inserisci il codice per attivare le offerte dei nostri PR.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <style>
        body.promo-portal {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #060611;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .portal-glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            position: relative;
            z-index: 10;
            animation: card-appear 0.8s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        @keyframes card-appear {
            0% {
                transform: translateY(30px);
                opacity: 0;
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .portal-logo {
            margin-bottom: 25px;
            text-decoration: none;
            display: inline-block;
        }

        .portal-input-group {
            margin: 30px 0 20px 0;
            position: relative;
        }

        .portal-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            padding: 14px 20px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .portal-input:focus {
            outline: none;
            border-color: #a855f7;
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
        }

        .portal-btn {
            width: 100%;
            background: linear-gradient(135deg, #a855f7, #ff00e5);
            border: none;
            color: #fff;
            padding: 14px;
            border-radius: 14px;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .portal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 229, 0.6);
        }

        .portal-btn:active {
            transform: translateY(0);
        }

        .portal-subtitle {
            font-size: 0.88rem;
            color: rgba(255,255,255,0.6);
            line-height: 1.5;
            font-weight: 300;
            margin: 10px 0 0 0;
        }

        .error-msg {
            color: #ff3b30;
            font-size: 0.8rem;
            margin-top: 10px;
            display: none;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(255, 59, 48, 0.3);
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .shake-element {
            animation: shake 0.4s ease-in-out;
        }
    </style>
</head>
<body class="promo-portal">
    <!-- Background Looping Video -->
    <video autoplay muted loop playsinline id="bg-video">
        <source src="assets/bg-video.mp4" type="video/mp4">
    </video>

    <!-- Neon Glow Blobs -->
    <div class="blob blob-purple"></div>
    <div class="blob blob-yellow"></div>
    <div class="blob blob-blue"></div>

    <div class="portal-glass-card" id="portalCard">
        <a href="index.html" class="portal-logo">
            <div class="brand-container">
                <h1 class="brand-summer">SUMMER</h1>
                <span class="brand-club">club</span>
            </div>
        </a>
        <h2 style="font-size: 1.3rem; font-weight: 700; color: #fff; margin: 0; text-transform: uppercase; letter-spacing: 0.5px;">Promozioni Riservate</h2>
        <p class="portal-subtitle">Inserisci il codice promozionale ricevuto per sbloccare l'esperienza personalizzata del tuo PR di riferimento.</p>

        <form id="promoForm" onsubmit="validateCode(event)">
            <div class="portal-input-group">
                <input type="text" id="promoInput" class="portal-input" placeholder="Codice PR" autocomplete="off" required>
                <div class="error-msg" id="errorMsg">Codice non valido. Riprova.</div>
            </div>
            <button type="submit" class="portal-btn">Attiva Offerta</button>
        </form>
    </div>

    <!-- Security & Protection Injected Defensive Scripts -->
    <script>
        // Disable Right-Click and DevTools shortcut keys to match site policy
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) || (e.ctrlKey && e.keyCode === 85)) {
                e.preventDefault();
            }
        });

        // Validate promo code
        function validateCode(event) {
            event.preventDefault();
            const input = document.getElementById('promoInput');
            const code = input.value.trim().toUpperCase();
            const errorMsg = document.getElementById('errorMsg');
            const card = document.getElementById('portalCard');

            // Temporary code check
            if (code === 'ENZO') {
                localStorage.setItem('active_promo', 'ENZO');
                window.location.href = 'index.html';
            } else {
                // Show shake error
                errorMsg.style.display = 'block';
                card.classList.add('shake-element');
                setTimeout(() => {
                    card.classList.remove('shake-element');
                }, 400);
            }
        }
    </script>
</body>
</html>
